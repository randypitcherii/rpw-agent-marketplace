name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Secret scan
        run: uv run python scripts/public_release_gate.py --repo-root .

      - name: Run tests
        run: uv run python -m unittest tests.test_repo_validations tests.test_public_release_gate -v
